name: Daily Trivia Update

on:
  schedule:
    # This runs at 13:30 UTC (7:30 AM CST / 8:30 AM EST) every day
    - cron: '0 13 * * *'
  workflow_dispatch:
    # This adds a "Run workflow" button in the GitHub Actions tab for manual testing

jobs:
  generate-and-mix:
    runs-on: ubuntu-latest
    
    # Critical: This allows the action to push the generated JSON files back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # This caches your npm dependencies so it runs faster next time
          #cache: 'npm'

      - name: Install Dependencies
        run: npm install @google/generative-ai axios

      - name: Generate Raw Categories
        # This script creates the individual files (tech.json, science.json, etc.)
        run: node node.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Create Casual & Professional Mixes
        # This script combines them into the 10-question "Mix" files
        run: node ./combine-triva.js

      - name: Commit and Push Changes
        # This part detects the new .json files and saves them to your repo
        run: |
          # Use the official GitHub bot identity to avoid 128 errors
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add questions/*.json
          
          # Only commit if there are actually changes
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Daily Trivia Update: $(date +'%Y-%m-%d')"
            git push
          else
            echo "Nothing new to push today."
          fi