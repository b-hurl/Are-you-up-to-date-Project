name: Daily Trivia Update

on:
  schedule:
    # This runs at 13:30 UTC (7:30 AM CST / 8:30 AM EST) every day
    - cron: '30 12 * * *'
  workflow_dispatch:
    # This adds a "Run workflow" button in the GitHub Actions tab for manual testing

jobs:
  generate-and-mix:
    runs-on: ubuntu-latest
    
    # Critical: This allows the action to push the generated JSON files back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-action

      - name: Route Traffic through Regina Home
        run: |
          # This forces the GitHub runner to use your home IP
          # --accept-dns=false prevents Tailscale from breaking the runner's internet if home DNS is slow
          sudo tailscale up --exit-node=${{ secrets.TS_EXIT_NODE_IP }} --reset --accept-dns=false
          tailscale status
          curl --connect-timeout 10 https://ifconfig.me

      - name: Generate Raw Categories
        # This script creates the individual files (tech.json, science.json, etc.)
        run: node node.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}

      - name: Create Casual & Professional Mixes
        # This script combines them into the 10-question "Mix" files
        run: node ./combine-triva.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Use "git add questions/" instead of "questions/*.json" 
          # to avoid the pathspec error if it's empty
          git add .
          
          # This "if" statement check prevents the 128 error 
          # if no new files were actually created
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Daily Trivia Update: $(date +'%Y-%m-%d')"
            git push
          else
            echo "No new files found to commit."
          fi