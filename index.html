<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Trivia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn { transition: all 0.2s ease; }
        .selected { 
            background-color: #4f46e5 !important; 
            border-color: #818cf8 !important; 
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        .correct { background-color: #10b981 !important; border-color: #059669 !important; }
        .incorrect { background-color: #ef4444 !important; border-color: #dc2626 !important; }
        .countdown-glow { text-shadow: 0 0 15px rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div id="main-card" class="w-full max-w-md bg-slate-800 rounded-3xl shadow-2xl p-8 border border-slate-700 relative">
        <div id="game-header" class="flex justify-between items-center mb-8 hidden">
            <span id="progress-text" class="text-slate-400 text-xs font-black uppercase tracking-widest">Question 1/5</span>
            <span id="score-display" class="bg-indigo-600 px-4 py-1 rounded-full text-xs font-bold shadow-lg shadow-indigo-500/20">Score: 0</span>
        </div>

        <div id="content-area" class="text-center">
            <h2 id="question-text" class="text-2xl font-bold leading-tight mb-8">Checking the clock...</h2>
            <div id="options-container" class="space-y-3 mb-6"></div>
            
            <div id="action-area" class="h-16 flex items-center justify-center">
                </div>
        </div>
    </div>

    <div id="results-card" class="hidden w-full max-w-md text-center bg-slate-800 rounded-3xl shadow-2xl p-10 border border-slate-700">
        <div class="text-5xl mb-4">🏆</div>
        <h2 class="text-3xl font-black mb-2">Daily Complete!</h2>
        
        <div class="mb-6 p-3 bg-slate-900/30 rounded-xl border border-slate-700/50">
        <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1">Next Trivia In</p>
        <div id="next-trivia-timer" class="text-xl font-mono font-bold text-indigo-400">00:00:00</div>
        <div class="flex justify-center gap-4 mb-6">
    <div class="bg-slate-900/50 p-4 rounded-2xl border border-orange-500/30 flex-1">
        <div class="text-[10px] uppercase tracking-widest text-orange-400 font-bold mb-1">🔥 Streak</div>
        <div id="streak-count" class="text-3xl font-black text-white">1</div>
    </div>
    <div class="bg-slate-900/50 p-4 rounded-2xl border border-indigo-500/30 flex-1">
        <div class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold mb-1">🏆 Best</div>
        <div id="best-streak" class="text-3xl font-black text-white">1</div>
    </div>
</div>
        </div>
        <div id="final-score" class="text-6xl font-black text-indigo-400 mb-6">0/0</div>
        <div id="review-section" class="text-left mb-8 space-y-3 border-t border-slate-700 pt-6 max-h-64 overflow-y-auto pr-2"></div>
        <button onclick="shareResults()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 mb-3">
            <span>Share Results</span>
        </button>
        <button onclick="location.reload()" class="w-full bg-slate-700 py-4 rounded-2xl font-bold">Play Again</button>
    </div>

    <script>
        const UNLOCK_HOUR = 8; 
        let currentIdx = 0;
        let score = 0;
        let gameData = null;
        let selectedIdx = null;

async function startApp() {
    // We no longer show a "Countdown" on the home screen because 
    // there is always a "current" trivia active until the next one hits at 8 AM.
    loadDailyFile();
}

async function loadDailyFile() {
    const now = new Date();
    const currentHour = now.getHours();
    
    // Create a date object to determine which file to fetch
    let triviaDate = new Date(now);

    // If it's before 8:00 AM, we want the PREVIOUS day's trivia file
    if (currentHour < UNLOCK_HOUR) {
        triviaDate.setDate(now.getDate() - 1);
    }

    // Format the date as YYYY-MM-DD
    const dateStr = `${triviaDate.getFullYear()}-${String(triviaDate.getMonth() + 1).padStart(2, '0')}-${String(triviaDate.getDate()).padStart(2, '0')}`;
    
    try {
        const response = await fetch(`${dateStr}.json?v=${new Date().getTime()}`);
        if (!response.ok) throw new Error();
        gameData = await response.json();
        document.getElementById('game-header').classList.remove('hidden');
        renderQuestion();
    } catch (err) {
        document.getElementById('question-text').innerText = "Trivia Refreshing...";
        document.getElementById('options-container').innerHTML = "<p class='text-slate-500'>The next set of questions will be ready shortly!</p>";
    }
}

        function renderQuestion() {
            selectedIdx = null;
            const currentQ = gameData.questions[currentIdx];
            document.getElementById('question-text').innerText = currentQ.q;
            document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/${gameData.questions.length}`;
            document.getElementById('action-area').innerHTML = ''; // Clear confirm button
            
            const optionsBox = document.getElementById('options-container');
            optionsBox.innerHTML = '';
            currentQ.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-5 rounded-2xl bg-slate-700 border border-slate-600 font-semibold transition-all";
                btn.innerText = opt;
                btn.onclick = () => selectOption(i);
                optionsBox.appendChild(btn);
            });
        }

        function selectOption(index) {
            selectedIdx = index;
            // Highlight selected button
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((btn, i) => {
                btn.classList.toggle('selected', i === index);
            });

            // Show Confirm Button
            document.getElementById('action-area').innerHTML = `
                <button onclick="confirmAnswer()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold animate-bounce-short">
                    Confirm Answer
                </button>`;
        }

        function confirmAnswer() {
            const buttons = document.querySelectorAll('.option-btn');
            const isCorrect = selectedIdx === gameData.questions[currentIdx].a;
            
            // Disable all buttons
            buttons.forEach(btn => btn.onclick = null);
            document.getElementById('action-area').innerHTML = '';

            if (isCorrect) {
                score++;
                buttons[selectedIdx].classList.add('correct');
            } else {
                buttons[selectedIdx].classList.add('incorrect');
            }

            setTimeout(() => {
                document.getElementById('score-display').innerText = `Score: ${score}`;
                if (currentIdx < gameData.questions.length - 1) {
                    currentIdx++;
                    renderQuestion();
                } else {
                    showFinalResults();
                }
            }, 1000);
        }

        // ... startApp call and results logic from previous steps remain the same ...
        // (Including showFinalResults, shareResults, and startCountdown)
        
function showFinalResults() {
    // 1. Swap the screens
    document.getElementById('main-card').classList.add('hidden');
    document.getElementById('results-card').classList.remove('hidden');
    
    // 2. Set the final score text
    document.getElementById('final-score').innerText = `${score}/${gameData.questions.length}`;

    // 3. START THE TIMER (The fix for the 00:00 issue)
    startNextTriviaCountdown();

    // 4. Build the Review Section
    const reviewSection = document.getElementById('review-section');
    reviewSection.innerHTML = '<h3 class="text-indigo-400 font-bold uppercase tracking-widest text-[10px] mb-4">Question Review & Sources</h3>';
    
    gameData.questions.forEach((q, index) => {
        const item = document.createElement('div');
        item.className = "bg-slate-900/40 p-4 rounded-xl border border-slate-700";
        item.innerHTML = `
            <p class="text-xs font-bold mb-1">${index + 1}. ${q.q}</p>
            <p class="text-[11px] text-slate-400 mb-2">Answer: <span class="text-emerald-400 font-bold">${q.options[q.a]}</span></p>
            ${q.source ? `<a href="${q.source}" target="_blank" class="text-[10px] text-indigo-400 underline italic">Source: Read More</a>` : ''}
        `;
        reviewSection.appendChild(item);
    });
}

function shareResults() {
    const total = gameData.questions.length;
    const streak = localStorage.getItem('trivia-streak') || 1;
    const squares = "🟩".repeat(score) + "🟥".repeat(total - score);
    
    const text = `Daily Trivia ${new Date().toLocaleDateString()}\n🔥 Streak: ${streak}\nScore: ${score}/${total}\n${squares}\nPlay at: ${window.location.origin}${window.location.pathname}`;

    if (navigator.share) {
        navigator.share({ text: text });
    } else {
        navigator.clipboard.writeText(text);
        alert("Copied with Streak info!");
    }
}

        function startCountdown() {
            document.getElementById('question-text').innerText = "Next Trivia Unlocks at 8:00 AM";
            const timerInterval = setInterval(() => {
                const now = new Date();
                const target = new Date(); target.setHours(UNLOCK_HOUR, 0, 0, 0);
                const diff = target - now;
                if (diff <= 0) { clearInterval(timerInterval); loadDailyFile(); return; }
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / (1000 * 60)) % 60);
                const s = Math.floor((diff / 1000) % 60);
                document.getElementById('options-container').innerHTML = `
                    <div class="bg-slate-900/50 p-8 rounded-2xl border border-indigo-500/20 text-center">
                        <div class="text-5xl font-mono font-black text-indigo-400">${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}</div>
                    </div>`;
            }, 1000);
        }

function startNextTriviaCountdown() {
    const timerDisplay = document.getElementById('next-trivia-timer');
    
    const updateTimer = () => {
        const now = new Date();
        const target = new Date();

        // The next "New" trivia always happens at the upcoming 8:00 AM
        if (now.getHours() >= 8) {
            // If it's 10:00 AM now, the next one is 8:00 AM tomorrow
            target.setDate(now.getDate() + 1);
        }
        // If it's 4:00 AM now, the target is 8:00 AM today
        target.setHours(8, 0, 0, 0);

        const diff = target - now;
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const m = Math.floor((diff / (1000 * 60)) % 60);
        const s = Math.floor((diff / 1000) % 60);

        timerDisplay.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    updateTimer();
    setInterval(updateTimer, 1000);
}
function updateStreak() {
    const now = new Date();
    const todayStr = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
    
    // Get stored data
    let streak = parseInt(localStorage.getItem('trivia-streak')) || 0;
    let lastDate = localStorage.getItem('trivia-last-date'); // e.g., "2026-2-9"
    let bestStreak = parseInt(localStorage.getItem('trivia-best-streak')) || 0;

    if (lastDate === todayStr) {
        // Already played today, just display current
    } else {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = `${yesterday.getFullYear()}-${yesterday.getMonth()}-${yesterday.getDate()}`;

        if (lastDate === yesterdayStr) {
            // Played yesterday! Streak continues
            streak++;
        } else {
            // Missed a day or first time playing
            streak = 1;
        }
        
        // Save new data
        localStorage.setItem('trivia-streak', streak);
        localStorage.setItem('trivia-last-date', todayStr);
        
        if (streak > bestStreak) {
            bestStreak = streak;
            localStorage.setItem('trivia-best-streak', bestStreak);
        }
    }

    // Update the UI
    document.getElementById('streak-count').innerText = streak;
    document.getElementById('best-streak').innerText = bestStreak;
}

        startApp();
    </script>
</body>
</html>
