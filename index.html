    <script>
        // --- CONFIG & AUDIO ---
        const UNLOCK_HOUR = 8;
        const SOUNDS = {
            correct: 'https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3',
            wrong: 'https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3',
            finish: 'https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3',
            perfect: 'https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3'
        };

        let isMuted = localStorage.getItem('trivia-muted') === 'true';
        let currentIdx = 0;
        let score = 0;
        let gameData = null;
        let selectedIdx = null;
        let isCurrentSelectionCorrect = false;
        let db = null;
        let userId = null;

        // --- UTILITIES ---
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getOrSetUserId() {
            let id = localStorage.getItem('trivia-userId');
            if (!id) {
                id = 'user_' + Date.now() + Math.random().toString(36).substring(2, 9);
                localStorage.setItem('trivia-userId', id);
            }
            return id;
        }

        function playSound(type) {
            if (isMuted) return; // BULLETPROOF MUTE CHECK
            const audio = new Audio(SOUNDS[type]);
            audio.volume = 0.4;
            audio.play().catch(() => {});
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem('trivia-muted', isMuted);
            document.getElementById('mute-icon').innerText = isMuted ? "🔇" : "🔊";
        }

// 8:00 AM CST is 14:00 UTC
const UNLOCK_UTC_HOUR = 14; 

// HELPER: Get the "Game Date" (Adjusts for the 8AM cutoff)
function getGameDate() {
    const now = new Date();
    // If it's before 14:00 UTC, the "Game Day" is actually yesterday
    if (now.getUTCHours() < 14) {
        now.setUTCDate(now.getUTCDate() - 1);
    }
    // Return a simple string: "2026-03-11"
    return `${now.getUTCFullYear()}-${String(now.getUTCMonth() + 1).padStart(2, '0')}-${String(now.getUTCDate()).padStart(2, '0')}`;
}

async function startApp() {
    const gameDate = getGameDate(); // e.g., "2026-03-12"
    console.log("Attempting to load trivia for date:", gameDate);
    
    try {
        const response = await fetch(`${gameDate}.json?v=${Date.now()}`);
        if (!response.ok) throw new Error();
        const freshData = await response.json();
        
        const saved = localStorage.getItem('trivia-session');
        
        if (saved) {
            const session = JSON.parse(saved);
            
            // CRITICAL CHECK: Is this session from a DIFFERENT day?
            if (session.date !== gameDate) {
                console.log("Old session detected. Clearing for new day...");
                localStorage.removeItem('trivia-session'); // Wipe yesterday's data
                window.userChoices = []; // Reset choices
                startNewSession(freshData, gameDate);
            } 
            else {
                // It is TODAY'S session, so we restore it
                gameData = { questions: session.shuffledQuestions };
                currentIdx = session.currentIdx;
                score = session.score;
                window.userChoices = session.userChoices || [];
                selectedIdx = session.selectedIdx ?? null;

                if (session.isFinished) {
                    showFinalResults();
                    return; // Jump to results and stop
                }
            }
        } else {
            // No saved session at all
            startNewSession(freshData, gameDate);
        }

        document.getElementById('score-display').innerText = `Score: ${score}`;
        document.getElementById('game-header').classList.remove('hidden');
        renderQuestion();
        
    } catch (err) {
        console.error("Error loading trivia:", err);
        document.getElementById('question-text').innerText = "New Trivia at 8:00 AM CST";
    }
}
function startNewSession(data, date) {
    // 1. Map the correct answer text to each question BEFORE shuffling
    gameData = {
        questions: data.questions.map(q => {
            return {
                ...q,
                correctText: q.options[q.a] // Store the actual correct string
            };
        })
    };

    // 2. Now shuffle the questions and the options safely
    gameData.questions = shuffle(gameData.questions);
    gameData.questions.forEach(q => {
        q.options = shuffle([...q.options]);
    });

    currentIdx = 0;
    score = 0;
    window.userChoices = [];
    selectedIdx = null;
    saveSession(false);
}

// Update the renderQuestion to handle the new format
function renderQuestion() {
    const currentQ = gameData.questions[currentIdx];
    document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/${gameData.questions.length}`;
    document.getElementById('question-text').innerText = currentQ.q;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    // Clear action area to prevent duplicates on re-render
    document.getElementById('action-area').innerHTML = '';
    
    currentQ.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        const isSelected = (i === selectedIdx);
        if (isSelected) isCurrentSelectionCorrect = (opt === currentQ.correctText);
        
        btn.className = `option-btn w-full text-left p-5 rounded-2xl bg-slate-700 border border-slate-600 font-semibold ${isSelected ? 'selected' : ''}`;
        btn.innerText = opt;
        btn.onclick = () => {
            selectedIdx = i;
            saveSession(); // Save immediately on click
            // Check if the text of this button matches our stored correct text
            isCurrentSelectionCorrect = (opt === currentQ.correctText);
            
            document.querySelectorAll('.option-btn').forEach((b, idx) => 
                b.classList.toggle('selected', idx === i));
            
            document.getElementById('action-area').innerHTML = 
                `<button onclick="confirmAnswer()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold">Confirm Answer</button>`;
        };
        container.appendChild(btn);
    });

    // If we restored a selection, ensure the confirm button is visible
    if (selectedIdx !== null) {
        document.getElementById('action-area').innerHTML = 
            `<button onclick="confirmAnswer()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold">Confirm Answer</button>`;
    }
}

let isProcessing = false; // Add this at the top of your script

function confirmAnswer() {
    if (isProcessing) return; 
    isProcessing = true;
    
    // Initialize the choices array if it doesn't exist
    if (!window.userChoices) window.userChoices = [];
    
    // SAVE the user's current selection index
    window.userChoices.push(selectedIdx);

    const buttons = document.querySelectorAll('.option-btn');
    document.getElementById('action-area').innerHTML = '';

    if (isCurrentSelectionCorrect) {
        score++;
        buttons[selectedIdx].classList.add('correct');
        playSound('correct');
    } else {
        buttons[selectedIdx].classList.add('incorrect');
        playSound('wrong');
    }

    document.getElementById('score-display').innerText = `Score: ${score}`;

    setTimeout(() => {
        if (currentIdx < gameData.questions.length - 1) {
            currentIdx++;
            selectedIdx = null; // Reset selection for the next question
            saveSession(false); 
            isProcessing = false;
            renderQuestion();
        } else {
            saveSession(true);
            isProcessing = false; 
            showFinalResults();
        }
    }, 1000);
}
function showFinalResults() {
// Force the UI to switch to results mode
    document.getElementById('main-card').classList.add('hidden');
    document.getElementById('game-header').classList.add('hidden'); // Hide the score/progress bar
    document.getElementById('results-card').classList.remove('hidden');
    
    const total = gameData.questions.length;
    const finalScoreDisplay = document.getElementById('final-score');
    const resultEmoji = document.getElementById('result-emoji');
    const titleElem = document.querySelector('#results-card h2'); // Targets the "Daily Complete!" text

    // 1. Define the Ranks
    const ranks = [
        { title: "Ouch...", color: "#ef4444", emoji: "💀" },       // 0/5
        { title: "Keep Trying!", color: "#f97316", emoji: "🐣" }, // 1/5
        { title: "Getting There", color: "#facc15", emoji: "🥉" }, // 2/5
        { title: "Solid Effort", color: "#a855f7", emoji: "🥈" },  // 3/5
        { title: "Trivia Pro!", color: "#3b82f6", emoji: "🥇" },   // 4/5
        { title: "LEGENDARY!", color: "#fbbf24", emoji: "👑" }    // 5/5
    ];

    // 2. Apply the Rank (Safety check: don't exceed array length)
    const rank = ranks[score] || ranks[0];
    
    titleElem.innerText = rank.title;
    titleElem.style.color = rank.color;
    resultEmoji.innerText = rank.emoji;
    finalScoreDisplay.innerText = `${score}/${total}`;

    // 3. Perfect Score Extras
    if (score === total) {
        const badge = document.createElement('div');
        badge.className = "perfect-badge text-sm uppercase mb-4";
        badge.innerText = "✨ Perfect Score ✨";
        finalScoreDisplay.parentNode.insertBefore(badge, finalScoreDisplay);
        
        playSound('perfect');
        fireConfetti();
    } else {
        playSound('finish');
        
    }

    startNextTimer();
    updateStreak();
    renderReview();

    // Pre-fill name and fetch leaderboard
    document.getElementById('player-name').value = localStorage.getItem('trivia-name') || '';
    if (db) {
        checkIfSubmitted();
        fetchAndDisplayLeaderboard();
    }
}

        // --- WRAP UP FUNCTIONS ---

async function submitScore() {
    const name = document.getElementById('player-name').value.trim();
    if (!name) {
        alert("Please enter a name to submit your score.");
        return;
    }
    localStorage.setItem('trivia-name', name);

    const btn = document.getElementById('submit-score-btn');
    btn.disabled = true;
    btn.innerText = "Submitting...";

    const gameDate = getGameDate();
    const scoreData = {
        name: name,
        score: score,
        date: gameDate,
        userId: userId,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };

    try {
        // Use the date and userId to create a unique ID for the document
        // This prevents a user from submitting more than once per day
        const docId = `${gameDate}_${userId}`;
        await db.collection('scores').doc(docId).set(scoreData);
        
        document.getElementById('leaderboard-submit-form').innerHTML = `<p class="text-emerald-400 text-sm font-bold w-full text-center">✅ Your score has been submitted!</p>`;
        fetchAndDisplayLeaderboard(); // Refresh the leaderboard with the new score
    } catch (error) {
        console.error("Error submitting score: ", error);
        alert("Could not submit score. Please try again.");
        btn.disabled = false;
        btn.innerText = "Submit Score";
    }
}

async function checkIfSubmitted() {
    const docId = `${getGameDate()}_${userId}`;
    const doc = await db.collection('scores').doc(docId).get();
    if (doc.exists) {
        document.getElementById('leaderboard-submit-form').innerHTML = `<p class="text-emerald-400 text-sm font-bold w-full text-center">✅ Your score for today is on the board!</p>`;
    }
}

async function fetchAndDisplayLeaderboard() {
    const display = document.getElementById('leaderboard-display');
    try {
        const snapshot = await db.collection('scores')
            .where('date', '==', getGameDate())
            .orderBy('score', 'desc')
            .orderBy('timestamp', 'asc')
            .limit(50)
            .get();

        if (snapshot.empty) {
            display.innerHTML = '<p class="text-slate-400 text-sm text-center">Be the first to get on the leaderboard today!</p>';
            return;
        }

        display.innerHTML = ''; // Clear loading/previous state
        const list = document.createElement('ol');
        list.className = "list-decimal list-inside space-y-2";
        snapshot.forEach(doc => {
            const data = doc.data();
            const item = document.createElement('li');
            item.className = `text-sm font-semibold flex justify-between items-center ${data.userId === userId ? 'text-indigo-300 font-black' : ''}`;
            item.innerHTML = `<span>${data.name}</span> <span class="font-mono bg-slate-700/50 px-2 py-0.5 rounded">${data.score}/5</span>`;
            list.appendChild(item);
        });
        display.appendChild(list);
    } catch (error) {
        console.error("Error fetching leaderboard:", error);
        if (error.message && error.message.includes("index")) {
            display.innerHTML = '<p class="text-amber-400 text-xs text-center mt-2">⚠️ Missing Firestore Index.<br>Open your browser console (F12) and click the link provided by Firebase to create it.</p>';
        } else {
            display.innerHTML = `<p class="text-red-400 text-xs text-center mt-2">Error: ${error.code || error.message}</p>`;
        }
    }
}

function startNextTimer() {
    const timerElem = document.getElementById('next-trivia-timer');
    
    const tick = () => {
        const now = new Date();
        let target = new Date();
        target.setUTCHours(14, 0, 0, 0);

        if (now.getUTCHours() >= 14) {
            target.setUTCDate(target.getUTCDate() + 1);
        }

        const diff = target.getTime() - now.getTime();

        if (diff <= 0) {
            // RELOAD!
            window.location.href = window.location.pathname + "?" + Date.now();
            return;
        }

        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        
        timerElem.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    tick();
    setInterval(tick, 1000);
}
function updateStreak() {
    const currentGameDate = getGameDate(); // The ID for today's game
    let streak = parseInt(localStorage.getItem('trivia-streak')) || 0;
    let lastGameDate = localStorage.getItem('trivia-last-date');
    let best = parseInt(localStorage.getItem('trivia-best')) || 0;

    // 1. If they already played THIS game date, do nothing
    if (lastGameDate === currentGameDate) {
        console.log("Already recorded streak for this game date.");
    } else {
        // 2. Check if they played the PREVIOUS game date
        const yesterday = new Date();
        // Go back 24 hours from "now" to check the previous window
        yesterday.setUTCHours(yesterday.getUTCHours() - 24);
        
        // Use a temporary adjustment to see what the Game Date was 24h ago
        let prevDateObj = new Date();
        if (new Date().getUTCHours() < 14) {
            prevDateObj.setUTCDate(prevDateObj.getUTCDate() - 2); // Was already yesterday, go back one more
        } else {
            prevDateObj.setUTCDate(prevDateObj.getUTCDate() - 1); // Was today, go back to yesterday
        }
        const prevGameDate = `${prevDateObj.getUTCFullYear()}-${String(prevDateObj.getUTCMonth() + 1).padStart(2, '0')}-${String(prevDateObj.getUTCDate()).padStart(2, '0')}`;

        if (lastGameDate === prevGameDate) {
            streak++; // Continued!
        } else {
            streak = 1; // Broke or first time
        }

        localStorage.setItem('trivia-streak', streak);
        localStorage.setItem('trivia-last-date', currentGameDate);
        
        if (streak > best) {
            best = streak;
            localStorage.setItem('trivia-best', best);
        }
    }

    document.getElementById('streak-count').innerText = streak;
    document.getElementById('best-streak').innerText = best;
}

function renderReview() {
    const review = document.getElementById('review-section');
    review.innerHTML = '<h3 class="text-indigo-400 font-bold uppercase tracking-widest text-[10px] mb-4">Your Answers</h3>';
    
    const choices = window.userChoices || [];

    gameData.questions.forEach((q, i) => {
        const userClickedIdx = choices[i];
        const userClickedText = q.options[userClickedIdx];
        const isCorrect = userClickedText === q.correctText;
        
        const div = document.createElement('div');
        div.className = `p-4 rounded-xl border mb-3 ${isCorrect ? 'bg-emerald-900/20 border-emerald-500/30' : 'bg-red-900/20 border-red-500/30'}`;
        
        div.innerHTML = `
            <p class="text-xs font-bold mb-2">${q.q}</p>
            <div class="flex flex-col gap-1 text-[11px]">
                <p class="${isCorrect ? 'text-emerald-400' : 'text-red-400'}">
                    ${isCorrect ? '✅' : '❌'} Your Answer: ${userClickedText || 'Skipped'}
                </p>
                ${!isCorrect ? `<p class="text-emerald-400 font-bold">✅ Correct Answer: ${q.correctText}</p>` : ''}
            </div>
        `;
        review.appendChild(div);
    });
}

        function fireConfetti() {
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.6 }, colors: ['#4f46e5', '#10b981'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.6 }, colors: ['#4f46e5', '#10b981'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

function shareResults() {
    const total = gameData.questions.length;
    const ranks = ["Ouch...", "Keep Trying!", "Getting There", "Solid Effort", "Trivia Pro!", "LEGENDARY!"];
    const myRank = ranks[score] || "Daily Trivia";
    const streak = localStorage.getItem('trivia-streak') || 1;
    
    // Create the visual grid
    const squares = "🟩".repeat(score) + "🟥".repeat(total - score);
    
    // The message body
    const shareTitle = `Daily Trivia: ${myRank}`;
    const shareBody = `${shareTitle}\n🔥 Streak: ${streak}\nScore: ${score}/${total}\n${squares}\n\nPlay today at: ${window.location.origin}`;

    // 1. Check if the device supports the "Native Share" menu (Common on Mobile/Mac Safari)
    if (navigator.share) {
        navigator.share({
            title: 'My Daily Trivia Results',
            text: shareBody,
            url: window.location.origin
        }).then(() => {
            console.log('Successful share');
        }).catch((error) => {
            console.log('Error sharing', error);
        });
    } 
    // 2. Fallback: Copy to Clipboard (Best for PC users on Discord, Teams, etc.)
    else {
        navigator.clipboard.writeText(shareBody).then(() => {
            // Visual feedback that it worked
            const shareBtn = document.querySelector('button[onclick="shareResults()"]');
            const originalText = shareBtn.innerText;
            shareBtn.innerText = "✅ Copied to Clipboard!";
            shareBtn.classList.replace('bg-indigo-600', 'bg-emerald-600');
            
            setTimeout(() => {
                shareBtn.innerText = originalText;
                shareBtn.classList.replace('bg-emerald-600', 'bg-indigo-600');
            }, 2500);
        });
    }
}
