<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Trivia</title>
    <meta property="og:type" content="website">
<meta property="og:url" content="https://your-site-name.vercel.app/">
<meta property="og:title" content="Daily Trivia Challenge">
<meta property="og:description" content="Can you beat my streak? New trivia every morning at 8:00 AM CST.">
<meta property="og:image" content="https://your-site-name.vercel.app/preview-image.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Daily Trivia Challenge">
<meta name="twitter:description" content="I just scored on today's trivia! Come play.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .option-btn { transition: all 0.2s ease; }
        .selected { background-color: #4f46e5 !important; border-color: #818cf8 !important; transform: scale(1.02); box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        .correct { background-color: #10b981 !important; border-color: #059669 !important; }
        .incorrect { background-color: #ef4444 !important; border-color: #dc2626 !important; }
        @keyframes gold-glow { 0%, 100% { text-shadow: 0 0 5px #fcd34d; transform: scale(1); } 50% { text-shadow: 0 0 20px #fbbf24; transform: scale(1.05); } }
        .perfect-badge { color: #fbbf24; animation: gold-glow 2s infinite ease-in-out; font-weight: 900; letter-spacing: 0.1em; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .share-btn {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    transition: all 0.3s ease;
}
.share-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(124, 58, 237, 0.6);
}
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <button id="mute-btn" onclick="toggleMute()" class="fixed top-4 right-4 z-50 bg-slate-800/80 p-3 rounded-full border border-slate-700 hover:bg-slate-700 transition-all">
        <span id="mute-icon" class="text-xl">🔊</span>
    </button>

    <div id="main-card" class="w-full max-w-md bg-slate-800 rounded-3xl shadow-2xl p-8 border border-slate-700 relative">
        <div id="game-header" class="flex justify-between items-center mb-8 hidden">
            <span id="progress-text" class="text-slate-400 text-xs font-black uppercase tracking-widest">Question 1/5</span>
            <span id="score-display" class="bg-indigo-600 px-4 py-1 rounded-full text-xs font-bold shadow-lg shadow-indigo-500/20">Score: 0</span>
        </div>
        <div id="content-area" class="text-center">
            <h2 id="question-text" class="text-2xl font-bold leading-tight mb-8">Loading Today's Challenge...</h2>
            <div id="options-container" class="space-y-3 mb-6"></div>
            <div id="action-area" class="h-16 flex items-center justify-center"></div>
        </div>
    </div>

    <div id="results-card" class="hidden w-full max-w-md text-center bg-slate-800 rounded-3xl shadow-2xl p-10 border border-slate-700">
        <div class="text-5xl mb-4" id="result-emoji">🏆</div>
        <h2 class="text-3xl font-black mb-2">Daily Complete!</h2>
        
        <div id="next-timer-container" class="mb-6 p-3 bg-slate-900/30 rounded-xl border border-slate-700/50">
            <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1">Next Trivia In</p>
            <div id="next-trivia-timer" class="text-xl font-mono font-bold text-indigo-400">00:00:00</div>
        </div>

        <div class="flex justify-center gap-4 mb-6">
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-orange-500/30 flex-1 text-center">
                <div class="text-[10px] uppercase tracking-widest text-orange-400 font-bold mb-1">🔥 Streak</div>
                <div id="streak-count" class="text-3xl font-black text-white">0</div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-indigo-500/30 flex-1 text-center">
                <div class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold mb-1">🏆 Best</div>
                <div id="best-streak" class="text-3xl font-black text-white">0</div>
            </div>
        </div>

        <div id="final-score" class="text-6xl font-black text-indigo-400 mb-6">0/0</div>
        <div id="review-section" class="text-left mb-8 space-y-3 border-t border-slate-700 pt-6 max-h-64 overflow-y-auto pr-2 scrollbar-hide"></div>
        
        <div class="space-y-3">
            <button onclick="shareResults()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">Share Results</button>
            <button onclick="location.reload()" class="w-full bg-slate-700 py-4 rounded-2xl font-bold">Play Again</button>
        </div>
    </div>

    <script>
        // --- CONFIG & AUDIO ---
        const UNLOCK_HOUR = 8;
        const SOUNDS = {
            correct: 'https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3',
            wrong: 'https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3',
            finish: 'https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3',
            perfect: 'https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3'
        };

        let isMuted = localStorage.getItem('trivia-muted') === 'true';
        let currentIdx = 0;
        let score = 0;
        let gameData = null;
        let selectedIdx = null;
        let isCurrentSelectionCorrect = false;

        // --- UTILITIES ---
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function playSound(type) {
            if (isMuted) return; // BULLETPROOF MUTE CHECK
            const audio = new Audio(SOUNDS[type]);
            audio.volume = 0.4;
            audio.play().catch(() => {});
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem('trivia-muted', isMuted);
            document.getElementById('mute-icon').innerText = isMuted ? "🔇" : "🔊";
        }

// 8:00 AM CST is 14:00 UTC
const UNLOCK_UTC_HOUR = 14; 

// HELPER: Get the "Game Date" (Adjusts for the 8AM cutoff)
function getGameDate() {
    const now = new Date();
    // If it's before 14:00 UTC, the "Game Day" is actually yesterday
    if (now.getUTCHours() < 14) {
        now.setUTCDate(now.getUTCDate() - 1);
    }
    // Return a simple string: "2026-03-11"
    return `${now.getUTCFullYear()}-${String(now.getUTCMonth() + 1).padStart(2, '0')}-${String(now.getUTCDate()).padStart(2, '0')}`;
}

async function startApp() {
    const gameDate = getGameDate();
    console.log("Current Game Date:", gameDate);

    try {
        const response = await fetch(`${gameDate}.json?v=${Date.now()}`);
        if (!response.ok) throw new Error();
        gameData = await response.json();
        gameData.questions = shuffle(gameData.questions);
        document.getElementById('game-header').classList.remove('hidden');
        renderQuestion();
    } catch (err) {
        document.getElementById('question-text').innerText = "New Trivia at 8:00 AM CST";
    }
}

        function renderQuestion() {
            selectedIdx = null;
            const currentQ = gameData.questions[currentIdx];
            document.getElementById('question-text').innerText = currentQ.q;
            document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/${gameData.questions.length}`;
            document.getElementById('action-area').innerHTML = '';
            
            let mappedOptions = currentQ.options.map((opt, i) => ({ text: opt, isCorrect: i === currentQ.a }));
            mappedOptions = shuffle(mappedOptions);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            mappedOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-5 rounded-2xl bg-slate-700 border border-slate-600 font-semibold";
                btn.innerText = opt.text;
                btn.onclick = () => {
                    selectedIdx = i;
                    isCurrentSelectionCorrect = opt.isCorrect;
                    document.querySelectorAll('.option-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i));
                    document.getElementById('action-area').innerHTML = `<button onclick="confirmAnswer()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold">Confirm Answer</button>`;
                };
                container.appendChild(btn);
            });
        }

        function confirmAnswer() {
            const buttons = document.querySelectorAll('.option-btn');
            document.getElementById('action-area').innerHTML = '';
            buttons.forEach(b => b.onclick = null);

            if (isCurrentSelectionCorrect) {
                score++;
                buttons[selectedIdx].classList.add('correct');
                playSound('correct');
            } else {
                buttons[selectedIdx].classList.add('incorrect');
                playSound('wrong');
            }

            setTimeout(() => {
                document.getElementById('score-display').innerText = `Score: ${score}`;
                if (currentIdx < gameData.questions.length - 1) {
                    currentIdx++;
                    renderQuestion();
                } else {
                    showFinalResults();
                }
            }, 1000);
        }

function showFinalResults() {
    document.getElementById('main-card').classList.add('hidden');
    document.getElementById('results-card').classList.remove('hidden');
    
    const total = gameData.questions.length;
    const finalScoreDisplay = document.getElementById('final-score');
    const resultEmoji = document.getElementById('result-emoji');
    const titleElem = document.querySelector('#results-card h2'); // Targets the "Daily Complete!" text

    // 1. Define the Ranks
    const ranks = [
        { title: "Ouch...", color: "#ef4444", emoji: "💀" },       // 0/5
        { title: "Keep Trying!", color: "#f97316", emoji: "🐣" }, // 1/5
        { title: "Getting There", color: "#facc15", emoji: "🥉" }, // 2/5
        { title: "Solid Effort", color: "#a855f7", emoji: "🥈" },  // 3/5
        { title: "Trivia Pro!", color: "#3b82f6", emoji: "🥇" },   // 4/5
        { title: "LEGENDARY!", color: "#fbbf24", emoji: "👑" }    // 5/5
    ];

    // 2. Apply the Rank (Safety check: don't exceed array length)
    const rank = ranks[score] || ranks[0];
    
    titleElem.innerText = rank.title;
    titleElem.style.color = rank.color;
    resultEmoji.innerText = rank.emoji;
    finalScoreDisplay.innerText = `${score}/${total}`;

    // 3. Perfect Score Extras
    if (score === total) {
        const badge = document.createElement('div');
        badge.className = "perfect-badge text-sm uppercase mb-4";
        badge.innerText = "✨ Perfect Score ✨";
        finalScoreDisplay.parentNode.insertBefore(badge, finalScoreDisplay);
        
        playSound('perfect');
        fireConfetti();
    } else {
        playSound('finish');
        
    }

    startNextTimer();
    updateStreak();
    renderReview();
}

        // --- WRAP UP FUNCTIONS ---
function startNextTimer() {
    const timerElem = document.getElementById('next-trivia-timer');
    
    const tick = () => {
        const now = new Date();
        let target = new Date();
        target.setUTCHours(14, 0, 0, 0);

        if (now.getUTCHours() >= 14) {
            target.setUTCDate(target.getUTCDate() + 1);
        }

        const diff = target.getTime() - now.getTime();

        if (diff <= 0) {
            // RELOAD!
            window.location.href = window.location.pathname + "?" + Date.now();
            return;
        }

        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        
        timerElem.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    tick();
    setInterval(tick, 1000);
}
function updateStreak() {
    const currentGameDate = getGameDate(); // The ID for today's game
    let streak = parseInt(localStorage.getItem('trivia-streak')) || 0;
    let lastGameDate = localStorage.getItem('trivia-last-date');
    let best = parseInt(localStorage.getItem('trivia-best')) || 0;

    // 1. If they already played THIS game date, do nothing
    if (lastGameDate === currentGameDate) {
        console.log("Already recorded streak for this game date.");
    } else {
        // 2. Check if they played the PREVIOUS game date
        const yesterday = new Date();
        // Go back 24 hours from "now" to check the previous window
        yesterday.setUTCHours(yesterday.getUTCHours() - 24);
        
        // Use a temporary adjustment to see what the Game Date was 24h ago
        let prevDateObj = new Date();
        if (new Date().getUTCHours() < 14) {
            prevDateObj.setUTCDate(prevDateObj.getUTCDate() - 2); // Was already yesterday, go back one more
        } else {
            prevDateObj.setUTCDate(prevDateObj.getUTCDate() - 1); // Was today, go back to yesterday
        }
        const prevGameDate = `${prevDateObj.getUTCFullYear()}-${String(prevDateObj.getUTCMonth() + 1).padStart(2, '0')}-${String(prevDateObj.getUTCDate()).padStart(2, '0')}`;

        if (lastGameDate === prevGameDate) {
            streak++; // Continued!
        } else {
            streak = 1; // Broke or first time
        }

        localStorage.setItem('trivia-streak', streak);
        localStorage.setItem('trivia-last-date', currentGameDate);
        
        if (streak > best) {
            best = streak;
            localStorage.setItem('trivia-best', best);
        }
    }

    document.getElementById('streak-count').innerText = streak;
    document.getElementById('best-streak').innerText = best;
}

        function renderReview() {
            const review = document.getElementById('review-section');
            review.innerHTML = '<h3 class="text-indigo-400 font-bold uppercase tracking-widest text-[10px] mb-4">Review & Sources</h3>';
            gameData.questions.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = "bg-slate-900/40 p-4 rounded-xl border border-slate-700";
                div.innerHTML = `<p class="text-xs font-bold mb-1">${q.q}</p><p class="text-[11px] text-slate-400 mb-2">Answer: <span class="text-emerald-400 font-bold">${q.options[q.a]}</span></p>${q.source ? `<a href="${q.source}" target="_blank" class="text-[10px] text-indigo-400 underline italic">Source: Learn More</a>` : ''}`;
                review.appendChild(div);
            });
        }

        function fireConfetti() {
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.6 }, colors: ['#4f46e5', '#10b981'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.6 }, colors: ['#4f46e5', '#10b981'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

function shareResults() {
    const total = gameData.questions.length;
    const ranks = ["Ouch...", "Keep Trying!", "Getting There", "Solid Effort", "Trivia Pro!", "LEGENDARY!"];
    const myRank = ranks[score] || "Daily Trivia";
    const streak = localStorage.getItem('trivia-streak') || 1;
    
    // Create the visual grid
    const squares = "🟩".repeat(score) + "🟥".repeat(total - score);
    
    // The message body
    const shareTitle = `Daily Trivia: ${myRank}`;
    const shareBody = `${shareTitle}\n🔥 Streak: ${streak}\nScore: ${score}/${total}\n${squares}\n\nPlay today at: ${window.location.origin}`;

    // 1. Check if the device supports the "Native Share" menu (Common on Mobile/Mac Safari)
    if (navigator.share) {
        navigator.share({
            title: 'My Daily Trivia Results',
            text: shareBody,
            url: window.location.origin
        }).then(() => {
            console.log('Successful share');
        }).catch((error) => {
            console.log('Error sharing', error);
        });
    } 
    // 2. Fallback: Copy to Clipboard (Best for PC users on Discord, Teams, etc.)
    else {
        navigator.clipboard.writeText(shareBody).then(() => {
            // Visual feedback that it worked
            const shareBtn = document.querySelector('button[onclick="shareResults()"]');
            const originalText = shareBtn.innerText;
            shareBtn.innerText = "✅ Copied to Clipboard!";
            shareBtn.classList.replace('bg-indigo-600', 'bg-emerald-600');
            
            setTimeout(() => {
                shareBtn.innerText = originalText;
                shareBtn.classList.replace('bg-emerald-600', 'bg-indigo-600');
            }, 2500);
        });
    }
}

        startApp();
    </script>
</body>
</html>
